<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abone Ol — Berkay Yüklü</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">
    <svg class="nav-logo-img" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#bf953f"/><stop offset="50%" style="stop-color:#fcf6ba"/><stop offset="100%" style="stop-color:#9a6f2a"/></linearGradient></defs>
      <rect width="36" height="36" rx="10" fill="#111114"/>
      <text x="18" y="25" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="20" fill="url(#g1)">B</text>
      <circle cx="28" cy="10" r="3" fill="url(#g1)" opacity="0.8"/>
    </svg>
    <span class="nav-logo-text">Berkay Yüklü</span>
  </a>
  <div class="nav-center">
    <a href="index.html" class="nav-link">Ana Sayfa</a>
    <a href="blog.html" class="nav-link">Blog</a>
    <a href="about.html" class="nav-link">Hakkında</a>
  </div>
  <div class="nav-right">
    <button class="btn btn-outline" id="loginBtn">Giriş Yap</button>
    <button class="btn btn-gold" id="registerBtn">Kayıt Ol</button>
    <div class="user-menu" id="userMenu">
      <button class="user-avatar-btn" id="userMenuBtn">
        <img class="user-avatar" id="userAvatar" src="" alt="">
        <span class="user-name" id="userDisplayName"></span>
      </button>
      <div class="user-dropdown">
        <a href="profile.html">👤 Profilim</a>
        <div class="divider"></div>
        <button onclick="signOut()">↩ Çıkış Yap</button>
      </div>
    </div>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>

<main>
  <div class="container">
    <div class="subscription-section">
      <div style="text-align:center;margin-bottom:48px">
        <div class="section-title" style="justify-content:center">💎 Abonelik Planları</div>
        <h1 style="font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);margin:16px 0 12px">
          Premium İçeriklere Erişin
        </h1>
        <p style="color:var(--text-secondary);max-width:480px;margin:0 auto">
          Özel blog yazıları, ayrıcalıklı içerikler ve daha fazlasına abone olarak erişin.
        </p>
      </div>

      <!-- Mevcut abonelik durumu -->
      <div id="subscriptionStatus" style="display:none;max-width:480px;margin:0 auto 32px;padding:16px 20px;background:rgba(200,150,62,0.1);border:1px solid var(--border-gold);border-radius:var(--radius);text-align:center">
        <span style="color:var(--gold-light)">✓ Zaten abonesiniz!</span>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px" id="subExpiry"></p>
      </div>

      <div class="plans-grid" id="plansGrid">
        <div style="text-align:center;grid-column:1/-1;padding:40px;color:var(--text-muted)">Planlar yükleniyor...</div>
      </div>

      <!-- FAQ -->
      <div style="margin-top:64px;max-width:600px;margin-left:auto;margin-right:auto">
        <div class="section-title">❓ Sık Sorulan Sorular</div>
        <div id="faqContainer"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <span>© 2024 Berkay Yüklü</span>
      <a href="index.html" style="color:var(--gold-light);text-decoration:none">← Ana Sayfa</a>
    </div>
  </div>
</footer>

<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('authModal')">✕</button>
    <div class="modal-title" id="authModalTitle">Giriş Yap</div>
    <div id="authFormContent"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  await loadPlans(document.getElementById("plansGrid"));

  // FAQ yükle
  const faqSnap = await db.collection("faq").orderBy("order","asc").get();
  const faqContainer = document.getElementById("faqContainer");
  faqSnap.docs.forEach(d => {
    const faq = d.data();
    const item = document.createElement("div");
    item.style.cssText = "background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;cursor:pointer";
    item.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:0.9rem" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">
        ${faq.question} <span>+</span>
      </div>
      <div style="display:none;margin-top:10px;color:var(--text-secondary);font-size:0.875rem;line-height:1.6">${faq.answer}</div>`;
    faqContainer.appendChild(item);
  });

  // Abonelik durumu
  auth.onAuthStateChanged(async user => {
    if (user) {
      const userDoc = await db.collection("users").doc(user.uid).get();
      const userData = userDoc.data();
      if (userData?.isSubscribed) {
        document.getElementById("subscriptionStatus").style.display = "block";
        if (userData.subscriptionExpiry) {
          const exp = userData.subscriptionExpiry.toDate ? userData.subscriptionExpiry.toDate() : new Date(userData.subscriptionExpiry);
          document.getElementById("subExpiry").textContent = `Aboneliğiniz ${exp.toLocaleDateString("tr-TR")} tarihinde sona erer.`;
        }
      }
    }
  });
});
</script>
</body>
</html>
